substitutions:
  device_name: marsrelay-esp32s3
  friendly_name: Marsrelay ESP32S3
  wifi_ssid: "YOUR_WIFI_SSID"
  wifi_password: "YOUR_WIFI_PASSWORD"
  ap_ssid: "Marsrelay Fallback"
  ap_password: "YOUR_AP_PASSWORD"
  mqtt_broker: 192.168.1.10
  mqtt_username: "mqtt_user"
  mqtt_password: "mqtt_password"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_LWIP_IPV6: y

external_components:
  - source:
      type: local
      path: ./components

logger:

wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}
  ap:
    ssid: ${ap_ssid}
    password: ${ap_password}

captive_dns:
  id: captive_dns_server

mqtt:
  id: mqtt_client
  broker: ${mqtt_broker}
  username: ${mqtt_username}
  password: ${mqtt_password}
  on_connect:
    - lambda: |-
        id(mqtt_client).subscribe("marstek_energy/+", [=](const std::string &topic, const std::string &payload) {
          id(local_broker).publish_message(topic, payload);
        });

mosquitto_broker:
  id: local_broker
  port: 1883
  max_clients: 10
  on_message:
    - then:
        - mqtt.publish:
            topic: !lambda |-
              return topic;
            payload: !lambda |-
              return payload;

web_server:
  port: 80

marstack_webserver:
  id: marstack_http
  on_request:
    - logger.log:
        format: "HTTP %s %s body=%s"
        args: [method.c_str(), url.c_str(), body.c_str()]
    - mqtt.publish:
        topic: !lambda |-
          std::string topic = "marsrelay/request";
          if (!source_ip.empty()) {
            topic += "/";
            topic += source_ip;
          }
          return topic;
        payload: !lambda |-
          return body;
