esphome:
  name: test-shelly-emulator

esp32:
  board: esp32dev
  framework:
    type: arduino

external_components:
  - source:
      type: local
      path: ../../components

wifi:
  ssid: "test"
  password: "testpass"
  ap:
    ssid: "fallback"
    password: "fallbackpass"

logger:

sensor:
  - platform: template
    id: power_w
    name: "Power"
    unit_of_measurement: W
    accuracy_decimals: 1

shelly_emulator:
  port: 1010
  device_id: "test"
  power_sensors:
    - power_w
