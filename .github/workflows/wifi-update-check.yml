name: wifi-update-check

# Daily check for upstream ESPHome releases that change the vendored `wifi`
# component (components/wifi/UPSTREAM_VERSION is our pin).
#
# Behaviour:
#   * wifi unchanged at the latest release            -> succeed (no-op)
#   * wifi changed, applies cleanly, no open PR yet   -> open an update PR, succeed
#   * wifi changed, applies cleanly, PR already open  -> succeed (already tracked)
#   * wifi changed but the patch no longer applies    -> FAIL (needs a manual update)
#
# So the job only goes red when an upstream wifi change can't be carried over
# automatically -- a clean update is delivered as a ready-to-merge PR, not a
# failure. The detection logic lives in scripts/check-wifi-upstream.sh; the
# actual re-vendor + patch re-apply reuses scripts/update-wifi.sh.
#
# Set the optional secret WIFI_UPDATE_TOKEN to a PAT to have the generated PR's
# own CI (CI / wifi-fork-check) run; with the default GITHUB_TOKEN, pushes from
# this workflow don't trigger other workflows.

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.WIFI_UPDATE_TOKEN || github.token }}

      - name: Detect upstream wifi change
        id: detect
        run: ./scripts/check-wifi-upstream.sh

      - name: Look for an existing auto-update PR
        if: steps.detect.outputs.changed == 'true'
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh pr list --state open --json headRefName \
            --jq '[.[] | select(.headRefName | startswith("automated/update-wifi-"))] | length')
          echo "Open auto-update PRs: $count"
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Attempt automatic update
        if: steps.detect.outputs.changed == 'true' && steps.existing.outputs.count == '0'
        id: update
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          ./scripts/update-wifi.sh "${{ steps.detect.outputs.latest }}"
          git add -A
          git commit -m "Re-apply marsrelay patch on esphome wifi ${{ steps.detect.outputs.latest }}"

      - name: Open pull request
        if: steps.detect.outputs.changed == 'true' && steps.existing.outputs.count == '0' && steps.update.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.WIFI_UPDATE_TOKEN || github.token }}
        run: |
          version="${{ steps.detect.outputs.latest }}"
          branch="automated/update-wifi-${version}"
          base="${{ github.event.repository.default_branch }}"
          git checkout -b "$branch"
          # force-with-lease in case a branch from a previously closed same-version
          # PR still lingers; we only get here when no auto-update PR is open.
          git push -u --force-with-lease origin "$branch"
          gh pr create \
            --base "$base" \
            --head "$branch" \
            --title "Update wifi component to ${version}" \
            --body "Automated update of the vendored ESPHome \`wifi\` component to \`${version}\`.

          The marsrelay AP+STA patch re-applied cleanly via \`scripts/update-wifi.sh\`, and \`scripts/check-wifi-fork.sh\` confirms the tree is exactly pristine upstream \`${version}\` + the patch.

          Generated by the \`wifi-update-check\` workflow. Please review the diff and let CI run before merging."
          echo "### Opened wifi update PR for ${version}" >> "$GITHUB_STEP_SUMMARY"

      - name: Report PR already exists
        if: steps.detect.outputs.changed == 'true' && steps.existing.outputs.count != '0'
        run: |
          echo "An auto-update PR is already open; nothing to do." \
            | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Fail when a manual update is required
        if: steps.detect.outputs.changed == 'true' && steps.existing.outputs.count == '0' && steps.update.outcome != 'success'
        run: |
          version="${{ steps.detect.outputs.latest }}"
          echo "::error::esphome ${version} changed the wifi component and the marsrelay patch no longer applies cleanly. Run scripts/update-wifi.sh ${version} locally and resolve the conflicts." \
            | tee -a "$GITHUB_STEP_SUMMARY"
          exit 1
